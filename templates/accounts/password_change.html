<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한울회 A+ 비밀번호 변경</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1953&q=80');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .change-container {
            display: flex;
            background-color: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
            margin: 20px;
            position: relative;
        }

        .change-intro {
            flex: 0 0 40%;
            background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 100%);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            text-align: left;
        }

        .change-intro h1 {
            font-size: 2.5rem;
            margin: 0 0 20px 0;
            line-height: 1.2;
        }

        .change-intro p {
            font-size: 1.1rem;
            line-height: 1.6;
            opacity: 0.9;
        }

        .change-intro .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .change-form {
            flex: 1;
            padding: 40px 50px;
            position: relative;
        }

        .change-form h2 {
            color: #1b4332;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 1.8rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background-color: #f8fafc;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2d6a4f;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(45, 106, 79, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #2d6a4f, #1b4332);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(27, 67, 50, 0.3);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #f1f5f9;
            color: #64748b;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background-color: #e2e8f0;
            color: #ef4444;
        }

        .error-message {
            color: #ef4444;
            background-color: #fef2f2;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            text-align: left;
            border-left: 3px solid #ef4444;
        }

        @media (max-width: 768px) {
            .change-container {
                flex-direction: column;
                max-width: 90%;
            }

            .change-intro {
                padding: 30px;
                text-align: center;
            }

            .change-form {
                padding: 30px;
            }
        }
    </style>
</head>

<body>
    <div class="change-container">
        <div class="change-intro">
            <div class="icon">🔒</div>
            <h1>비밀번호<br>변경</h1>
            <p>안전한 학습을 위해<br>주기적으로 비밀번호를 변경해 주세요.</p>
        </div>

        <div class="change-form">
            <a href="{% url 'main:mypage' %}" class="close-btn" title="마이페이지로">&times;</a>

            <h2>비밀번호 변경</h2>

            <form action="" method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label for="current_pw">현재 비밀번호</label>
                    <input id="current_pw" type="password" name="current_password" placeholder="현재 비밀번호를 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="new_pw">새 비밀번호</label>
                    <input id="new_pw" type="password" name="new_password" placeholder="새 비밀번호 (8자 이상)" minlength="8" required>
                </div>

                <div class="form-group">
                    <label for="confirm_pw">새 비밀번호 확인</label>
                    <input id="confirm_pw" type="password" name="confirm_password" placeholder="새 비밀번호를 다시 입력하세요" minlength="8" required>
                </div>

                <button type="submit" class="submit-btn">비밀번호 변경</button>

                {% if messages %}
                <div style="margin-top: 20px;">
                    {% for message in messages %}
                    <div class="error-message" style="{% if message.tags == 'success' %}color: #2d6a4f; background-color: #e6fffa; border-left-color: #2d6a4f;{% endif %}">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}
            </form>
        </div>
    </div>
</body>

</html>
