{% extends "base.html" %}

{% block title %}기사문제 관리{% endblock %}

{% block extra_css %}
<style>
    .manage-wrap { display: flex; gap: 16px; padding: 16px; min-height: calc(100vh - 60px); }
    .panel { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 16px; overflow-y: auto; }
    .panel-left { flex: 0 0 45%; max-height: calc(100vh - 80px); overflow-y: auto; }
    .panel-right { flex: 1; position: sticky; top: 70px; max-height: calc(100vh - 80px); overflow-y: auto; }
    .panel-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 12px; color: #1a237e; }

    /* 셀렉터 */
    .sel-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .sel-row select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.88rem; flex: 1; min-width: 0; }

    /* 텍스트 입력 */
    .paste-area { width: 100%; min-height: 160px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-size: 0.85rem; resize: vertical; font-family: inherit; line-height: 1.6; }
    .paste-area:focus { outline: none; border-color: #3949ab; }
    .btn-parse { display: inline-block; margin-top: 8px; padding: 8px 20px; background: #3949ab; color: #fff; border: none; border-radius: 8px; font-size: 0.88rem; font-weight: 700; cursor: pointer; }
    .btn-parse:hover { background: #283593; }

    /* 파싱 결과 */
    .parsed-list { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
    .parsed-card { border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px; background: #fafbff; }
    .parsed-card.registered { opacity: 0.5; }
    .parsed-card.active-search { border-color: #3949ab; box-shadow: 0 0 0 2px rgba(57,73,171,0.2); }
    .pc-num { font-weight: 800; color: #3949ab; margin-right: 4px; }
    .pc-text { font-size: 0.9rem; line-height: 1.6; margin-bottom: 6px; white-space: pre-wrap; }
    .pc-choices { font-size: 0.84rem; color: #555; margin-bottom: 6px; }
    .pc-choice { margin-left: 8px; }
    .pc-answer { font-size: 0.82rem; color: #d93025; font-weight: 700; margin-bottom: 8px; }
    .pc-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .btn-sm { padding: 5px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer; background: #fff; }
    .btn-search { color: #3949ab; border-color: #7986cb; }
    .btn-search:hover { background: #e8eaf6; }
    .btn-go-search { color: #fff; background: #3949ab; border-color: #3949ab; }
    .btn-go-search:hover { background: #283593; }
    .btn-direct { color: #2e7d32; border-color: #81c784; }
    .btn-direct:hover { background: #e8f5e9; }
    .btn-done { color: #888; border-color: #ddd; cursor: default; background: #f5f5f5; }

    /* 명사 태그 */
    .noun-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .noun-tag { display: inline-block; padding: 3px 10px; border: 1px solid #c5cae9; border-radius: 12px; font-size: 0.78rem; color: #3949ab; cursor: pointer; user-select: none; transition: all 0.15s; }
    .noun-tag:hover { background: #e8eaf6; }
    .noun-tag.selected { background: #3949ab; color: #fff; border-color: #3949ab; }
    .noun-loading { font-size: 0.78rem; color: #999; margin-top: 6px; }

    /* 우측 검색결과 */
    .search-empty { color: #999; text-align: center; padding: 60px 20px; font-size: 0.9rem; }
    .search-info { font-size: 0.82rem; color: #666; margin-bottom: 10px; }
    .search-keywords { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .search-kw { display: inline-block; padding: 2px 8px; background: #e8eaf6; border-radius: 10px; font-size: 0.72rem; color: #3949ab; font-weight: 700; }
    .sr-list { display: flex; flex-direction: column; gap: 10px; }
    .sr-card { border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px; background: #fff; }
    .sr-badge { display: inline-block; font-size: 0.72rem; font-weight: 800; color: #fff; background: #546e7a; padding: 2px 8px; border-radius: 5px; margin-right: 4px; }
    .sr-text { font-size: 0.88rem; line-height: 1.6; margin: 6px 0; white-space: pre-wrap; }
    .sr-choices { font-size: 0.82rem; color: #555; margin-bottom: 4px; }
    .sr-answer { font-size: 0.8rem; color: #d93025; font-weight: 700; }
    .sr-exp { font-size: 0.78rem; color: #666; margin-top: 4px; padding: 6px 10px; background: #f9f9f9; border-radius: 6px; border-left: 3px solid #7986cb; max-height: 80px; overflow: hidden; }
    .btn-register { padding: 5px 14px; background: #3949ab; color: #fff; border: none; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer; margin-top: 6px; }
    .btn-register:hover { background: #283593; }
    .btn-registered { background: #aaa; cursor: default; }
    .kw-hl { background: #fff176; color: #000; padding: 0 2px; border-radius: 2px; }

    @media (max-width: 768px) {
        .manage-wrap { flex-direction: column; }
        .panel-left, .panel-right { flex: none; max-height: none; position: static; }
    }
</style>
{% endblock %}

{% block content %}
<div class="manage-wrap">
    <!-- 좌측 패널 -->
    <div class="panel panel-left">
        <div class="panel-title">문제 입력 / 파싱</div>

        <div class="sel-row">
            <select id="selCert">
                <option value="">자격증 선택</option>
                {% for c in certs %}
                <option value="{{ c.pk }}">{{ c.name }} ({{ c.category }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="sel-row">
            <select id="selYear">
                <option value="">연도</option>
            </select>
            <select id="selRound">
                <option value="">회차</option>
                <option value="1">1회</option>
                <option value="2">2회</option>
                <option value="3">3회</option>
                <option value="4">4회</option>
            </select>
            <select id="selSubject">
                <option value="">과목</option>
            </select>
        </div>

        <textarea class="paste-area" id="pasteArea" placeholder="문제 텍스트를 붙여넣으세요..."></textarea>
        <button class="btn-parse" onclick="parseQuestions()">파싱하기</button>
        <button class="btn-parse" style="background:#78909c;" onclick="resetAll()">초기화</button>

        <div class="parsed-list" id="parsedList"></div>
    </div>

    <!-- 우측 패널 -->
    <div class="panel panel-right">
        <div class="panel-title">검색 결과</div>
        <div id="searchResult">
            <div class="search-empty">좌측에서 [검색] 버튼을 클릭하면<br>여기에 결과가 표시됩니다.</div>
        </div>
    </div>
</div>

<script>
const SUBJECTS = {{ subjects_json|safe }};
const CSRF = '{{ csrf_token }}';

// ── 셀렉터 초기화 ──
(function initSelectors() {
    const selYear = document.getElementById('selYear');
    for (let y = 2050; y >= 2010; y--) {
        const opt = document.createElement('option');
        opt.value = y; opt.textContent = y + '년';
        if (y === new Date().getFullYear()) opt.selected = true;
        selYear.appendChild(opt);
    }

    document.getElementById('selCert').addEventListener('change', function() {
        const selSubj = document.getElementById('selSubject');
        selSubj.innerHTML = '<option value="">과목</option>';
        const list = SUBJECTS[this.value] || [];
        list.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.id; opt.textContent = s.name;
            selSubj.appendChild(opt);
        });
    });

    const params = new URLSearchParams(location.search);
    const certParam = params.get('cert');
    if (certParam) {
        document.getElementById('selCert').value = certParam;
        document.getElementById('selCert').dispatchEvent(new Event('change'));
    }
})();

function resetAll() {
    _parsed = [];
    document.getElementById('pasteArea').value = '';
    document.getElementById('parsedList').innerHTML = '';
    clearSearchPanel();
}

// ── 파싱 ──
let _parsed = [];

function parseQuestions() {
    const raw = document.getElementById('pasteArea').value.trim();
    if (!raw) return alert('텍스트를 입력하세요.');

    _parsed = [];
    let blocks = [];

    if (/\[\d+\]\./.test(raw)) {
        blocks = raw.split(/(?=\[\d+\]\.)/).filter(b => b.trim());
    } else if (/^\d{1,3}\.\s+/m.test(raw)) {
        blocks = raw.split(/(?=^\d{1,3}\.\s+)/m).filter(b => b.trim());
    } else {
        blocks = raw.split(/\n\s*\n/).filter(b => b.trim());
    }

    let currentSubject = '';
    blocks.forEach((block, idx) => {
        block = block.trim();
        const subjMatch = block.match(/(?:\*\*제?\d+과목\s*|={3,}\s*\n\s*\d+과목\s*:\s*)(.+?)(?:\*\*|={3,}|\n)/);
        if (subjMatch) { currentSubject = subjMatch[1].trim(); return; }
        if (/^={3,}\s*\n?\s*정답표/m.test(block) || /^정답표\s*$/m.test(block)) return;

        const q = parseOneQuestion(block, idx);
        if (q && q.text) { q.subject = currentSubject; _parsed.push(q); }
    });

    renderParsed();
    extractAllNouns();
}

function parseOneQuestion(block, fallbackNum) {
    let text = '', choices = ['', '', '', ''], answer = '';

    let numMatch = block.match(/^\[?(\d+)\]?\.\s*/);
    let number = numMatch ? parseInt(numMatch[1]) : (fallbackNum + 1);
    if (numMatch) block = block.slice(numMatch[0].length);

    const ansMatch = block.match(/정답\s*:\s*([①②③④1234])/);
    if (ansMatch) {
        const map = {'①':'1','②':'2','③':'3','④':'4'};
        answer = map[ansMatch[1]] || ansMatch[1];
        block = block.replace(/정답\s*:\s*[①②③④1234]\s*$/, '').trim();
    }

    if (/[①②③④]/.test(block)) {
        const parts = block.split(/[①②③④]/);
        text = parts[0].trim();
        for (let i = 1; i <= 4 && i < parts.length; i++) choices[i-1] = parts[i].trim();
    } else if (/[1-4]\)/.test(block)) {
        const parts = block.split(/[1-4]\)/);
        text = parts[0].trim();
        for (let i = 1; i <= 4 && i < parts.length; i++) choices[i-1] = parts[i].trim();
    } else {
        text = block.trim();
    }

    return { number, text, choices, answer, nouns: null };
}

function renderParsed() {
    const container = document.getElementById('parsedList');
    if (!_parsed.length) {
        container.innerHTML = '<div style="color:#999;font-size:0.85rem;padding:10px;">파싱된 문제가 없습니다.</div>';
        return;
    }
    container.innerHTML = _parsed.map((q, i) => {
        const choiceHtml = q.choices.map((c, ci) =>
            c ? `<div class="pc-choice">${ci+1}) ${esc(c)}</div>` : ''
        ).join('');
        return `
        <div class="parsed-card" id="pc-${i}">
            <div class="pc-text"><span class="pc-num">${q.number}.</span> ${esc(q.text)}</div>
            ${choiceHtml ? `<div class="pc-choices">${choiceHtml}</div>` : ''}
            ${q.answer ? `<div class="pc-answer">정답: ${q.answer}</div>` : ''}
            <div id="nouns-${i}"></div>
        </div>`;
    }).join('');
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function highlight(text, keywords) {
    if (!keywords || !keywords.length) return text;
    const escaped = keywords.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
    const re = new RegExp('(' + escaped.join('|') + ')', 'gi');
    return text.replace(re, '<span class="kw-hl">$1</span>');
}

// ── 명사 추출 + 태그 선택 ──
async function extractAllNouns() {
    for (let i = 0; i < _parsed.length; i++) {
        const q = _parsed[i];
        const nounsDiv = document.getElementById('nouns-' + i);
        if (q.nouns) continue;

        const fullText = [q.text, ...q.choices.filter(c => c)].join(' ');
        nounsDiv.innerHTML = '<div class="noun-loading">명사 추출 중...</div>';

        try {
            const res = await fetch('{% url "gisa:manage_nouns" %}', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
                body: JSON.stringify({text: fullText}),
            });
            const data = await res.json();
            q.nouns = data.nouns || [];
            renderNounTags(i);
        } catch (e) {
            nounsDiv.innerHTML = '<div class="noun-loading" style="color:#d93025;">명사 추출 실패</div>';
        }
    }
}

function renderNounTags(idx) {
    const q = _parsed[idx];
    const nounsDiv = document.getElementById('nouns-' + idx);

    if (!q.nouns.length) {
        nounsDiv.innerHTML = '<div class="noun-loading">추출된 명사 없음</div>';
        return;
    }

    nounsDiv.innerHTML = `
        <div class="noun-tags">
            ${q.nouns.map(n => `<span class="noun-tag selected" onclick="toggleNoun(this)">${esc(n)}</span>`).join('')}
        </div>
        <div class="pc-actions" style="margin-top:6px;">
            <button class="btn-sm btn-go-search" onclick="doSearch(${idx})">선택 키워드로 검색</button>
            <button class="btn-sm btn-direct" onclick="directRegister(${idx})">직접등록</button>
        </div>
    `;
}

function toggleNoun(el) {
    const container = el.closest('.noun-tags');
    if (!container.dataset.touched) {
        // 첫 클릭: 전체 해제 후 클릭한 것만 선택
        container.dataset.touched = '1';
        container.querySelectorAll('.noun-tag').forEach(t => t.classList.remove('selected'));
        el.classList.add('selected');
    } else {
        el.classList.toggle('selected');
    }
}

// ── 검색 실행 ──
async function doSearch(idx) {
    const q = _parsed[idx];
    const nounsDiv = document.getElementById('nouns-' + idx);

    // 명사가 아직 추출 안 됐으면 먼저 추출
    if (!q.nouns) {
        const fullText = [q.text, ...q.choices.filter(c => c)].join(' ');
        nounsDiv.innerHTML = '<div class="noun-loading">명사 추출 중...</div>';
        try {
            const res = await fetch('{% url "gisa:manage_nouns" %}', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
                body: JSON.stringify({text: fullText}),
            });
            const data = await res.json();
            q.nouns = data.nouns || [];
            renderNounTags(idx);
        } catch (e) {
            nounsDiv.innerHTML = '<div class="noun-loading" style="color:#d93025;">명사 추출 실패</div>';
            return;
        }
    }

    const selectedTags = nounsDiv.querySelectorAll('.noun-tag.selected');
    const keywords = Array.from(selectedTags).map(t => t.textContent);

    if (!keywords.length) return alert('검색할 키워드를 선택하세요.');

    // 과목 필터
    const subjectId = document.getElementById('selSubject').value;

    // 활성 카드 표시
    document.querySelectorAll('.parsed-card').forEach(c => c.classList.remove('active-search'));
    document.getElementById('pc-' + idx).classList.add('active-search');

    const panel = document.getElementById('searchResult');
    panel.innerHTML = '<div class="search-empty">검색 중...</div>';

    try {
        const res = await fetch('{% url "gisa:manage_search" %}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
            body: JSON.stringify({keywords: keywords, subject_id: subjectId ? +subjectId : null}),
        });
        const data = await res.json();
        renderSearchResults(data.questions || [], idx, keywords);
    } catch (e) {
        panel.innerHTML = '<div class="search-empty">검색 오류: ' + e.message + '</div>';
    }
}

function renderSearchResults(questions, parsedIdx, keywords) {
    const panel = document.getElementById('searchResult');
    const kwHtml = keywords.map(k => `<span class="search-kw">${esc(k)}</span>`).join('');

    if (!questions.length) {
        panel.innerHTML = `<div class="search-keywords">${kwHtml}</div>
            <div class="search-empty">검색 결과가 없습니다.<br>키워드를 줄이거나 [직접등록]을 이용하세요.</div>`;
        return;
    }

    panel.innerHTML = `
        <div class="search-keywords">${kwHtml}</div>
        <div class="search-info">${questions.length}건 (파싱 ${_parsed[parsedIdx].number}번 기준)</div>
        <div class="sr-list">${questions.map(q => `
            <div class="sr-card">
                <span class="sr-badge">${esc(q.cert_name)}</span>
                <span class="sr-badge" style="background:#37474f">${q.year}-${q.round}회</span>
                <span class="sr-badge" style="background:#5c6bc0">${esc(q.subject)}</span>
                <div class="sr-text">${q.number}. ${highlight(esc(q.text), keywords)}</div>
                <div class="sr-choices">
                    <div>1) ${highlight(esc(q.choice_1), keywords)}</div>
                    <div>2) ${highlight(esc(q.choice_2), keywords)}</div>
                    <div>3) ${highlight(esc(q.choice_3), keywords)}</div>
                    <div>4) ${highlight(esc(q.choice_4), keywords)}</div>
                </div>
                <div class="sr-answer">정답: ${q.answer}</div>
                ${q.explanation ? `<div class="sr-exp">${esc(q.explanation)}</div>` : ''}
                <button class="btn-register" id="reg-${q.id}" onclick="registerCopy(${q.id}, ${q.subject_id}, ${parsedIdx})">등록</button>
            </div>`).join('')}
        </div>`;
}

function clearSearchPanel() {
    document.getElementById('searchResult').innerHTML =
        '<div class="search-empty">좌측에서 [검색] 버튼을 클릭하면<br>여기에 결과가 표시됩니다.</div>';
}

// ── 등록 ──
function getSelectors() {
    const cert = document.getElementById('selCert').value;
    const year = document.getElementById('selYear').value;
    const round = document.getElementById('selRound').value;
    const subject = document.getElementById('selSubject').value;
    if (!cert || !year || !round) {
        alert('자격증, 연도, 회차를 선택하세요.');
        return null;
    }
    return { cert_id: +cert, year: +year, round: +round, subject_id: subject ? +subject : null };
}

async function registerCopy(sourceId, sourceSubjectId, parsedIdx) {
    const sel = getSelectors();
    if (!sel) return;
    const q = _parsed[parsedIdx];

    const body = {
        mode: 'copy', source_id: sourceId,
        cert_id: sel.cert_id, year: sel.year, round: sel.round,
        subject_id: sel.subject_id || sourceSubjectId, number: q.number,
    };

    const btn = document.getElementById('reg-' + sourceId);
    btn.disabled = true; btn.textContent = '등록 중...';

    try {
        const res = await fetch('{% url "gisa:manage_register" %}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
            body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.ok) {
            btn.textContent = '등록완료'; btn.classList.add('btn-registered');
            document.getElementById('pc-' + parsedIdx)?.classList.add('registered');
            clearSearchPanel();
        } else {
            alert(data.error || '등록 실패');
            btn.disabled = false; btn.textContent = '등록';
        }
    } catch (e) {
        alert('오류: ' + e.message);
        btn.disabled = false; btn.textContent = '등록';
    }
}

async function directRegister(idx) {
    const sel = getSelectors();
    if (!sel) return;
    if (!sel.subject_id) { alert('직접등록은 과목을 선택해야 합니다.'); return; }
    const q = _parsed[idx];

    const body = {
        mode: 'new', cert_id: sel.cert_id, year: sel.year, round: sel.round,
        subject_id: sel.subject_id, number: q.number,
        text: q.text, choice_1: q.choices[0], choice_2: q.choices[1],
        choice_3: q.choices[2], choice_4: q.choices[3], answer: q.answer || '0',
    };

    const card = document.getElementById('pc-' + idx);
    const btn = card.querySelector('.btn-direct');
    btn.disabled = true; btn.textContent = '등록 중...';

    try {
        const res = await fetch('{% url "gisa:manage_register" %}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
            body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.ok) {
            btn.textContent = '등록완료'; btn.classList.remove('btn-direct'); btn.classList.add('btn-done');
            card.classList.add('registered');
            clearSearchPanel();
        } else {
            alert(data.error || '등록 실패');
            btn.disabled = false; btn.textContent = '직접등록';
        }
    } catch (e) {
        alert('오류: ' + e.message);
        btn.disabled = false; btn.textContent = '직접등록';
    }
}
</script>
{% endblock %}
