{% extends "base.html" %}

{% block title %}복원통계{% endblock %}

{% block extra_css %}
<style>
    .manage-wrap {
        width: min(680px, 92vw);
        margin: 0 auto;
    }

    .manage-nav {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
    }

    .manage-nav a {
        text-decoration: none;
        padding: 8px 18px;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 700;
        transition: background 0.2s;
    }

    .manage-nav .active {
        background: var(--forest);
        color: #fff;
    }

    .manage-nav a:not(.active) {
        background: #e8f5df;
        color: var(--forest);
    }

    .manage-nav a:not(.active):hover {
        background: #d4ebc8;
    }

    .manage-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .manage-header h1 {
        font-size: 1.4rem;
        color: var(--forest);
        margin: 0;
    }

    .restore-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        background: #fff;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(30, 70, 42, 0.07);
    }

    .restore-table thead { background: #f6faf3; }

    .restore-table th {
        padding: 12px 14px;
        font-size: 0.78rem;
        font-weight: 700;
        text-align: left;
        color: #6b8a72;
        border-bottom: 2px solid #e0ece0;
        white-space: nowrap;
    }

    .restore-table td {
        padding: 11px 14px;
        font-size: 0.85rem;
        border-bottom: 1px solid #f2f5f2;
        color: #333;
    }

    .restore-table tbody tr:hover { background: #fafdf8; }
    .restore-table tbody tr:last-child td { border-bottom: none; }

    .td-name { font-weight: 600; color: #1b4332; }
    .td-count { font-weight: 700; color: #333; text-align: right; }
    .td-date { color: #888; font-size: 0.8rem; white-space: nowrap; }

    .restore-empty {
        color: #888;
        text-align: center;
        padding: 40px 0;
    }

    .restore-loading {
        text-align: center;
        padding: 16px 0;
        color: #aaa;
        font-size: 0.82rem;
        display: none;
    }

    /* 모바일 */
    .restore-cards { display: none; }

    @media (max-width: 720px) {
        .manage-wrap { width: 100%; padding: 0 10px; box-sizing: border-box; }
        .manage-nav { flex-wrap: wrap; gap: 6px; }
        .manage-nav a { padding: 6px 12px; font-size: 0.8rem; }
        .manage-header { margin-bottom: 14px; }
        .manage-header h1 { font-size: 1.15rem; }

        .restore-table { display: none; }
        .restore-cards { display: block; }

        .r-card {
            background: #fff;
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 8px;
            box-shadow: 0 1px 6px rgba(30,70,42,0.06);
            border: 1px solid #eef3ee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .r-card-left { flex: 1; }
        .r-card-name { font-size: 0.9rem; font-weight: 700; color: #1b4332; }
        .r-card-subj { font-size: 0.78rem; color: #888; margin-top: 2px; }
        .r-card-right { text-align: right; }
        .r-card-count { font-size: 0.9rem; font-weight: 700; color: #333; }
        .r-card-date { font-size: 0.72rem; color: #aaa; margin-top: 2px; }
    }
</style>
{% endblock %}

{% block content %}
<div class="manage-wrap">
    <nav class="manage-nav">
        <a href="{% url 'main:subject_manage' %}">교과목 관리</a>
        <a href="{% url 'exam:exam_manage' %}">시험 관리</a>
        <a href="{% url 'exam:question_manage' %}">문제 관리</a>
        <a href="{% url 'main:member_manage' %}">회원 관리</a>
        <a href="{% url 'main:restore_stats' %}" class="active">복원통계</a>
        <a href="{% url 'gisa:gisa_question_manage' %}">기사문제</a>
    </nav>

    <div class="manage-header">
        <h1>복원통계</h1>
        <span style="font-size:0.85rem; color:#888; font-weight:600;">총 {{ restore_total }}문항</span>
    </div>

    <!-- 데스크톱 테이블 -->
    <table class="restore-table">
        <thead>
            <tr>
                <th>등록일</th>
                <th>과목</th>
                <th style="text-align:right;">문항수</th>
                <th>이름</th>
            </tr>
        </thead>
        <tbody id="restore-tbody"></tbody>
    </table>

    <!-- 모바일 카드 -->
    <div class="restore-cards" id="restore-cards"></div>

    <div class="restore-loading" id="restore-loading">불러오는 중...</div>
    <p class="restore-empty" id="restore-empty" style="display:none;">등록된 복원 데이터가 없습니다.</p>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    var page = 1;
    var loading = false;
    var done = false;
    var tbody = document.getElementById('restore-tbody');
    var cards = document.getElementById('restore-cards');
    var loadingEl = document.getElementById('restore-loading');
    var emptyEl = document.getElementById('restore-empty');

    function loadMore() {
        if (loading || done) return;
        loading = true;
        loadingEl.style.display = 'block';

        fetch('{% url "main:restore_stats_api" %}?page=' + page)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (page === 1 && data.rows.length === 0) {
                emptyEl.style.display = 'block';
                document.querySelector('.restore-table').style.display = 'none';
            }
            data.rows.forEach(function(r) {
                // 데스크톱 행
                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td class="td-date">' + r.reg_date + '</td>' +
                    '<td>' + r.subject + '</td>' +
                    '<td class="td-count"><span style="color:#1565c0;">' + r.count + '</span></td>' +
                    '<td class="td-name">' + r.name + '</td>';
                tbody.appendChild(tr);

                // 모바일 카드
                var card = document.createElement('div');
                card.className = 'r-card';
                card.innerHTML =
                    '<div class="r-card-left">' +
                        '<div class="r-card-date">' + r.reg_date + '</div>' +
                        '<div class="r-card-subj">' + r.subject + '</div>' +
                    '</div>' +
                    '<div class="r-card-right">' +
                        '<div class="r-card-count"><span style="color:#1565c0;">' + r.count + '</span>문항</div>' +
                        '<div class="r-card-name">' + r.name + '</div>' +
                    '</div>';
                cards.appendChild(card);
            });

            if (!data.has_next) done = true;
            page++;
            loading = false;
            loadingEl.style.display = 'none';
        })
        .catch(function() {
            loading = false;
            loadingEl.style.display = 'none';
        });
    }

    // 초기 로드
    loadMore();

    // 스크롤 감지
    window.addEventListener('scroll', function() {
        if (done || loading) return;
        var scrollBottom = window.innerHeight + window.scrollY;
        if (scrollBottom >= document.body.offsetHeight - 200) {
            loadMore();
        }
    });
})();
</script>
{% endblock %}
